name: Build Garmin Analyzer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install libmtp
        run: brew install libmtp

      - name: Build native MTP helper
        run: |
          TARGET=$(rustc -vV | awk '/^host:/ { print $2 }')
          BREW=$(brew --prefix)
          clang -I"${BREW}/include" -L"${BREW}/lib" -lmtp \
            -o "src-tauri/src/native/garmin_mtp-${TARGET}" \
            src-tauri/src/native/garmin_mtp.c

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/
          if-no-files-found: warn
