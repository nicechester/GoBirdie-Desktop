<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoBirdie Desktop</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Maplibre GL -->
    <link href="https://unpkg.com/maplibre-gl@4.4.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
    <script type="module" src="js/app.js"></script>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-gray-50">

    <!-- Header -->
    <header class="flex-shrink-0 flex items-center justify-between px-6 py-4 border-b bg-white shadow-sm">
        <div class="flex items-center gap-3">
            <img src="/images/icon.jpeg" alt="" class="w-9 h-9 rounded-xl object-cover">
            <h1 class="text-2xl font-bold tracking-tight"><span class="text-red-500">Go</span><span class="text-blue-600">Birdie</span> <span id="app-title" class="text-gray-400 font-normal text-lg"></span></h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="store-stats" class="text-sm text-gray-500"></span>
            <button id="sync-btn"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm font-medium flex items-center gap-2">
                <span id="sync-icon">⌚</span>
                <span id="sync-label">Sync Watch</span>
            </button>
            <button id="apple-sync-btn"
                class="hidden bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm font-medium flex items-center gap-2">
                <span>📱</span>
                <span id="apple-sync-label">Sync iPhone</span>
            </button>
            <button id="android-sync-btn"
                class="hidden bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm font-medium flex items-center gap-2">
                <span>📱</span>
                <span id="android-sync-label">Sync Android</span>
            </button>
            <div class="relative">
                <button id="hamburger-btn"
                    class="p-2 rounded-lg hover:bg-gray-100 transition text-gray-500 hover:text-gray-700" title="Menu">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <rect x="2" y="4" width="16" height="2" rx="1"/>
                        <rect x="2" y="9" width="16" height="2" rx="1"/>
                        <rect x="2" y="14" width="16" height="2" rx="1"/>
                    </svg>
                </button>
                <div id="hamburger-menu" class="hidden absolute right-0 top-full mt-1 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
                    <button id="menu-trends" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2.5">
                        <span>📊</span> <span id="menu-trends-label">Trends</span>
                    </button>
                    <div class="border-t border-gray-100 my-1"></div>
                    <button id="menu-settings" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2.5">
                        <span>⚙️</span> <span id="menu-settings-label">Settings</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main layout -->
    <div class="flex-1 flex overflow-hidden">

        <!-- Left: Rounds list -->
        <aside id="rounds-sidebar" class="w-80 flex-shrink-0 flex flex-col border-r bg-white overflow-hidden">
            <div class="p-4 border-b">
                <input type="text" id="search-input" placeholder="Search rounds..."
                    class="w-full p-2 border rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div id="rounds-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <p class="text-gray-400 text-sm text-center mt-8">No rounds yet.<br>Connect your watch and click Sync.</p>
            </div>
        </aside>

        <!-- Right: Round detail -->
        <main id="detail-panel" class="flex-1 overflow-y-auto">
            <div id="detail-empty" class="flex flex-col items-center justify-center h-full text-gray-400">
                <span class="text-6xl mb-4">⛳</span>
                <p class="text-lg">Select a round to view details</p>
            </div>
            <div id="detail-content" class="hidden w-full px-6 pb-6"></div>
        </main>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-lg text-sm max-w-sm z-50"></div>

    <!-- Setup / Settings modal -->
    <div id="setup-modal" class="modal-overlay hidden"></div>

</body>
</html>
